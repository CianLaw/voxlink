name: VoxLink Release Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  # =========================================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT
          fi

  # =========================================================================
  # Linux 构建：AppImage + deb
  # =========================================================================
  build-linux:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: 安装 Linux 系统依赖（Tauri 必需）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - run: npm install -g @tauri-apps/cli@latest

      - run: tauri build --bundles appimage,deb

      - name: 上传 Linux 包
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

  # =========================================================================
  # Android 构建：APK (universal)
  # =========================================================================
  build-android:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装 Android SDK / NDK
        uses: android-actions/setup-android@v3

      - name: 安装 Rust Android 目标和 cargo-ndk
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
          cargo install cargo-ndk --version 3.5.4 --locked

      - name: 设置 Android SDK 环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # 使用 CI 预装的 NDK（不要手动安装 ndk;27 避免版本冲突）
          NDK_VER=$(ls -1 $ANDROID_SDK_ROOT/ndk/ | tail -1)
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/$NDK_VER" >> $GITHUB_ENV
          echo "Using NDK: $NDK_VER"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: 安装必要的 SDK 组件
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: 初始化 Android 项目
        run: |
          rm -rf src-tauri/gen/android
          npx tauri android init
          echo "=== gen/android 结构 ==="
          ls -la src-tauri/gen/android/

      - name: 注入 Android 权限（麦克风、前台服务、网络）
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          # 在 </manifest> 前插入权限声明
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n</manifest>|' "$MANIFEST"
          cat "$MANIFEST"

      - name: 关闭 Android release minify（避免 Rust/JNI 符号被混淆）
        run: |
          GRADLE=src-tauri/gen/android/app/build.gradle.kts
          # 新版 Tauri 模板可能已经默认关闭，所以容错处理
          if grep -q "isMinifyEnabled" "$GRADLE"; then
            sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/g' "$GRADLE"
          else
            echo "isMinifyEnabled 字段未找到（可能新模板默认 false），跳过"
          fi
          if grep -q "isShrinkResources" "$GRADLE"; then
            sed -i 's/isShrinkResources = true/isShrinkResources = false/g' "$GRADLE"
          else
            echo "isShrinkResources 字段未找到，跳过"
          fi
          cat "$GRADLE"

      - name: 构建 Android APK（aarch64）
        run: npx tauri android build --apk --target aarch64

      - name: 上传 Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 7

  # =========================================================================
  # iOS 构建（可选，不阻塞发布）
  # 使用 npx tauri ios build --debug 让 Tauri 完整执行构建流程（Rust 库 + 前端 + xcodebuild），
  # 通过直接修改 project.pbxproj 禁用代码签名，无需 Apple Developer 账号。
  # 本 job 设为 continue-on-error: true，构建失败不会阻塞其他平台发布。
  # =========================================================================
  build-ios:
    needs: get-version
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: 初始化 iOS 项目
        run: |
          rm -rf src-tauri/gen/apple
          npx tauri ios init
          ls -la src-tauri/gen/apple/

      - name: 安装 CocoaPods 依赖
        run: |
          cd src-tauri/gen/apple
          sudo gem install cocoapods -v 1.15.2
          pod install 2>&1 || true
          ls -la

      - name: 注入 iOS 麦克风权限描述（Info.plist）
        run: |
          find src-tauri/gen/apple -path "*/ios*" -name "Info.plist" -type f | while read PLIST; do
            echo "Injecting into $PLIST"
            /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'VoxLink 需要访问麦克风以进行语音识别输入。'" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string 'VoxLink 需要语音识别权限以将您的语音转换为文字。'" "$PLIST" 2>/dev/null || true
          done

      - name: 创建 Nosign.xcconfig 并禁用代码签名
        run: |
          cd "$GITHUB_WORKSPACE"
          APPLE_DIR="src-tauri/gen/apple"
          XCODEPROJ=$(find "$APPLE_DIR" -maxdepth 1 -name "*.xcodeproj" -type d | head -1)
          PBXPROJ="$XCODEPROJ/project.pbxproj"
          echo "Xcode project: $XCODEPROJ"
          echo "pbxproj path: $PBXPROJ"

          printf '%s\n' \
            'CODE_SIGN_IDENTITY = ""' \
            'CODE_SIGNING_REQUIRED = NO' \
            'CODE_SIGNING_ALLOWED = NO' \
            'CODE_SIGN_ENTITLEMENTS = ""' \
            'DEVELOPMENT_TEAM = ""' \
            'ENABLE_BITCODE = NO' \
            'PROVISIONING_PROFILE = ""' \
            'PROVISIONING_PROFILE_SPECIFIER = ""' \
            > "$APPLE_DIR/Nosign.xcconfig"
          echo "=== Nosign.xcconfig created ==="
          cat "$APPLE_DIR/Nosign.xcconfig"

          echo "=== Patching project.pbxproj to disable code signing ==="
          sed -i.bak \
            -e 's/CODE_SIGN_IDENTITY = "[^"]*";/CODE_SIGN_IDENTITY = "";/g' \
            -e 's/CODE_SIGN_IDENTITY = -;/CODE_SIGN_IDENTITY = "";/g' \
            -e 's/DEVELOPMENT_TEAM = "[^"]*";/DEVELOPMENT_TEAM = "";/g' \
            -e 's/DEVELOPMENT_TEAM = [A-Z0-9]\{10\};/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' \
            -e 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' \
            -e 's/PROVISIONING_PROFILE_SPECIFIER = "[^"]*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' \
            -e 's/PROVISIONING_PROFILE = "[^"]*";/PROVISIONING_PROFILE = "";/g' \
            -e 's/CODE_SIGN_ENTITLEMENTS = "[^"]*";/CODE_SIGN_ENTITLEMENTS = "";/g' \
            "$PBXPROJ"
          rm -f "$PBXPROJ.bak"

          echo "=== Verify pbxproj patch (code signing lines) ==="
          grep -nE 'CODE_SIGN|DEVELOPMENT_TEAM' "$PBXPROJ" | head -30 || echo "No matching lines found"

      - name: 构建 iOS Debug 包（通过 tauri ios build）
        run: |
          cd "$GITHUB_WORKSPACE"
          echo "=== Creating fake Tauri dev server addr file ==="
          mkdir -p "$TMPDIR"
          echo "127.0.0.1:0" > "$TMPDIR/com.voxlink.app-server-addr" 2>/dev/null || true
          ls -la "$TMPDIR/com.voxlink.app-server-addr" 2>/dev/null || echo "Warning: addr file not in TMPDIR"

          echo "=== Setting code signing env vars ==="
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export DEVELOPMENT_TEAM=""

          echo "=== Running npx tauri ios build --debug ==="
          set +e
          npx tauri ios build --debug 2>&1 | tail -200
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          echo "tauri ios build exit code: $BUILD_EXIT"

          echo "=== Searching for build products ==="
          echo "--- DerivedData .app ---"
          find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null
          echo "--- target/aarch64-apple-ios .app ---"
          find "$GITHUB_WORKSPACE/src-tauri/target/aarch64-apple-ios" -name "*.app" -type d 2>/dev/null
          echo "--- target/aarch64-apple-ios-sim .app ---"
          find "$GITHUB_WORKSPACE/src-tauri/target/aarch64-apple-ios-sim" -name "*.app" -type d 2>/dev/null
          echo "--- Any .ipa files ---"
          find ~/Library/Developer/Xcode/DerivedData "$GITHUB_WORKSPACE" -name "*.ipa" -not -path "*/node_modules/*" -type f 2>/dev/null

      - name: 打包 unsigned IPA
        run: |
          cd "$GITHUB_WORKSPACE"
          echo "=== 搜索构建产物 ==="

          IPA_PATH=""
          APP_PATH=""

          EXISTING_IPA=$(find ~/Library/Developer/Xcode/DerivedData "$GITHUB_WORKSPACE/src-tauri/gen" "$GITHUB_WORKSPACE/src-tauri/target" -name "*.ipa" -not -path "*/node_modules/*" -type f 2>/dev/null | head -1)
          if [ -n "$EXISTING_IPA" ] && [ -f "$EXISTING_IPA" ]; then
            IPA_PATH="$EXISTING_IPA"
            echo "Found existing IPA: $IPA_PATH"
          fi

          if [ -z "$IPA_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | grep -iE 'iphoneos|Debug-iphoneos|Release-iphoneos' | head -1)
            echo "DerivedData (iphoneos) .app: $APP_PATH"
          fi

          if [ -z "$APP_PATH" ] && [ -z "$IPA_PATH" ]; then
            APP_PATH=$(find "$GITHUB_WORKSPACE/src-tauri/target/aarch64-apple-ios" "$GITHUB_WORKSPACE/src-tauri/target/aarch64-apple-ios-sim" -name "*.app" -type d 2>/dev/null | head -1)
            echo "target (ios) .app: $APP_PATH"
          fi

          if [ -n "$IPA_PATH" ]; then
            echo "使用已存在的 IPA: $IPA_PATH"
            cp "$IPA_PATH" VoxLink-unsigned.ipa
          elif [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "=== 打包 .app 为 IPA ==="
            echo "App path: $APP_PATH"
            ls -la "$APP_PATH/" | head -20
            APP_SIZE=$(du -sk "$APP_PATH" | awk '{print $1}')
            echo "VoxLink.app size: ${APP_SIZE} KB"
            if [ "$APP_SIZE" -lt 100 ]; then
              echo "ERROR: VoxLink.app 太小 (${APP_SIZE}KB)，构建可能失败"
              exit 1
            fi
            mkdir -p Payload
            ditto "$APP_PATH" "Payload/$(basename "$APP_PATH")"
            ditto -c -k --sequesterRsrc --keepParent Payload VoxLink-unsigned.ipa
            rm -rf Payload
          else
            echo "ERROR: 找不到构建产物，列出所有可能位置："
            echo "=== DerivedData (top-level) ==="
            find ~/Library/Developer/Xcode/DerivedData -maxdepth 3 -type d 2>/dev/null | head -30
            echo "=== src-tauri/target (ios dirs) ==="
            find "$GITHUB_WORKSPACE/src-tauri/target" -maxdepth 3 -type d -name "*ios*" 2>/dev/null | head -20
            echo "=== src-tauri/gen/apple ==="
            find "$GITHUB_WORKSPACE/src-tauri/gen/apple" -maxdepth 4 -name "*.app" -o -name "*.ipa" 2>/dev/null | head -20
            exit 1
          fi

          echo "=== IPA created ==="
          ls -la VoxLink-unsigned.ipa

      - name: 上传 iOS unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-builds
          path: VoxLink-unsigned.ipa
          retention-days: 7

  # =========================================================================
  # 发布 Release 并上传所有产物
  # =========================================================================
  create-release:
    needs: [get-version, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: always() && (needs.build-linux.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: 下载 Linux 产物
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux

      - name: 下载 Android 产物
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: artifacts/android

      - name: 下载 iOS 产物
        if: always() && needs.build-ios.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ios-builds
          path: artifacts/ios

      - name: 整理产物（移除 -unsigned 等后缀便于识别）
        run: |
          mkdir -p release-assets
          # Linux
          find artifacts/linux -name "*.AppImage" -exec cp {} release-assets/ \; 2>/dev/null || true
          find artifacts/linux -name "*.deb" -exec cp {} release-assets/ \; 2>/dev/null || true
          # Android (优先 release APK，fallback debug)
          APK_RELEASE=$(find artifacts/android -name "*release*.apk" -type f | head -1)
          APK_DEBUG=$(find artifacts/android -name "*debug*.apk" -type f | head -1)
          if [ -n "$APK_RELEASE" ]; then
            cp "$APK_RELEASE" release-assets/VoxLink-v${{ needs.get-version.outputs.version }}.apk
          elif [ -n "$APK_DEBUG" ]; then
            cp "$APK_DEBUG" release-assets/VoxLink-v${{ needs.get-version.outputs.version }}.apk
          fi
          # iOS
          find artifacts/ios -name "*.ipa" -exec cp {} release-assets/ \; 2>/dev/null || true
          echo "=== Release 产物列表 ==="
          ls -la release-assets/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: VoxLink v${{ needs.get-version.outputs.version }}
          body: |
            # VoxLink v${{ needs.get-version.outputs.version }}

            ## 当前可用平台

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Linux (x86_64) | `.AppImage` / `.deb` | 开箱即用 |
            | Android (arm64) | `.apk` | 允许「未知来源」后直接安装 |
            | iOS | `.ipa` (unsigned) | 需使用 AltStore/Sideloadly 等工具自签名安装 |

            ## 安装说明

            ### Linux
            **AppImage（推荐）:**
            1. 下载 `.AppImage`
            2. `chmod +x VoxLink-*.AppImage`
            3. `./VoxLink-*.AppImage`

            **deb（Debian/Ubuntu）:**
            1. `sudo dpkg -i voxlink_*.deb`

            ### Android
            1. 下载 `.apk` 到手机
            2. 在文件管理器中点击安装，允许「未知来源」
            3. 首次启动授予「麦克风」权限

            ### iOS
            由于 Apple 限制，未签名 IPA 无法直接安装。您需要：
            - 使用 **AltStore** / **Sideloadly** 等工具用自己的 Apple ID 签名安装
            - 或使用 **TrollStore**（越狱设备）永久安装
            - macOS / Windows 版本正在开发中
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
