  #       with:
  #         java-version: "17"
  #         distribution: "temurin"
  #     - uses: android-actions/setup-android@v3
  #     - run: npm install -g @tauri-apps/cli@latest
  #     - run: tauri android init
  #     - run: tauri android build --apk
  #     - name: 上传 Android APK
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: android-builds
  #         path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
  #         retention-days: 7

  # =========================================================================
  create-release:
    needs: [get-version, build-linux]
    runs-on: ubuntu-latest
    if: always() && needs.build-linux.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: 下载 Linux 产物
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux

      - name: 整理产物
        run: |
          mkdir -p release-assets
          find artifacts -name "*.AppImage" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: VoxLink v${{ needs.get-version.outputs.version }}
          body: |
            # VoxLink v${{ needs.get-version.outputs.version }}

            ## 当前可用平台
            - Linux 桌面端 (.AppImage) — x86_64

            > macOS / Windows / Android 构建正在修复中，后续版本将逐步恢复。

            ## 安装说明
            ### Linux
            1. 下载 .AppImage
            2. `chmod +x voxlink*.AppImage`
            3. `./voxlink*.AppImage`
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}