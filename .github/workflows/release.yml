name: VoxLink Release Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  # =========================================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT
          fi

  # =========================================================================
  # Linux 构建：AppImage + deb
  # =========================================================================
  build-linux:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: 安装 Linux 系统依赖（Tauri 必需）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - run: npm install -g @tauri-apps/cli@latest

      - run: tauri build --bundles appimage,deb

      - name: 上传 Linux 包
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

  # =========================================================================
  # Android 构建：APK (universal)
  # =========================================================================
  build-android:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装 Android SDK / NDK
        uses: android-actions/setup-android@v3

      - name: 安装 Rust Android 目标和 cargo-ndk
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
          cargo install cargo-ndk --version 3.5.4 --locked

      - name: 设置 Android SDK 环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/$(ls -1 $ANDROID_SDK_ROOT/ndk/ | tail -1)" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: 安装必要的 SDK 组件
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973"

      - run: npm install -g @tauri-apps/cli@latest

      - name: 初始化 Android 项目（强制使用当前 Tauri CLI 重新生成）
        run: |
          rm -rf src-tauri/gen/android
          tauri android init
          ls -la src-tauri/gen/android/

      - name: 注入 Android 权限（麦克风、前台服务、网络）
        run: |
          MANIFEST=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          # 在 </manifest> 前插入权限声明
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n</manifest>|' "$MANIFEST"
          cat "$MANIFEST"

      - name: 关闭 Android release minify（避免 Rust/JNI 符号被混淆）
        run: |
          GRADLE=src-tauri/gen/android/app/build.gradle.kts
          # 新版 Tauri 模板可能已经默认关闭，所以容错处理
          if grep -q "isMinifyEnabled" "$GRADLE"; then
            sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/g' "$GRADLE"
          else
            echo "isMinifyEnabled 字段未找到（可能新模板默认 false），跳过"
          fi
          if grep -q "isShrinkResources" "$GRADLE"; then
            sed -i 's/isShrinkResources = true/isShrinkResources = false/g' "$GRADLE"
          else
            echo "isShrinkResources 字段未找到，跳过"
          fi
          cat "$GRADLE"

      - name: 构建 Android APK（aarch64）
        run: tauri android build --apk --target aarch64-linux-android

      - name: 上传 Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # =========================================================================
  # iOS 构建（可选，不阻塞发布）
  # 注意：iOS 真机构建需要 Apple Developer 账号签名（$99/年），
  # 在无签名的 CI 环境下无法生成可安装到真机的 IPA。
  # 本 job 设为 continue-on-error，会先尝试模拟器构建验证代码可编译。
  # =========================================================================
  build-ios:
    needs: get-version
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - run: npm install -g @tauri-apps/cli@latest

      - name: 初始化 iOS 项目（强制使用当前 Tauri CLI 重新生成）
        run: |
          rm -rf src-tauri/gen/apple
          tauri ios init
          ls -la src-tauri/gen/apple/
          echo "=== 查找所有 Info.plist ==="
          find src-tauri/gen/apple -name "Info.plist" -type f

      - name: 安装 CocoaPods 依赖（容错）
        run: |
          cd src-tauri/gen/apple
          sudo gem install cocoapods -v 1.15.2
          # Podfile 可能引用不存在的 macOS target，pod install 可能失败，不阻塞
          pod install 2>&1 || true
          echo "=== 当前目录文件 ==="
          ls -la

      - name: 注入 iOS 麦克风权限描述（Info.plist）
        run: |
          # 找到所有 iOS app 的 Info.plist 并注入
          find src-tauri/gen/apple -path "*/ios*" -name "Info.plist" -type f | while read PLIST; do
            echo "Injecting into $PLIST"
            /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'VoxLink 需要访问麦克风以进行语音识别输入。'" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :NSSpeechRecognitionUsageDescription string 'VoxLink 需要语音识别权限以将您的语音转换为文字。'" "$PLIST" 2>/dev/null || true
          done
          find src-tauri/gen/apple -name "Info.plist" -type f -exec echo "=== {} ===" \; -exec cat {} \;

      - name: 构建 iOS unsigned IPA
        run: |
          set +e
          cd src-tauri/gen/apple
          # 优先使用 workspace（若 pod install 成功），否则使用 xcodeproj
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | grep -v pods | head -1)
          PROJ=$(ls *.xcodeproj 2>/dev/null | head -1)
          echo "WORKSPACE=$WORKSPACE  PROJ=$PROJ"
          # 列出 schemes
          if [ -n "$WORKSPACE" ]; then
            xcodebuild -workspace "$WORKSPACE" -list 2>&1 | tail -20
            XCODE_CMD="xcodebuild -workspace $WORKSPACE"
          elif [ -n "$PROJ" ]; then
            xcodebuild -project "$PROJ" -list 2>&1 | tail -20
            XCODE_CMD="xcodebuild -project $PROJ"
          else
            echo "ERROR: 找不到 Xcode 项目文件"
            find . -name "*.xcworkspace" -o -name "*.xcodeproj"
            exit 1
          fi
          # 尝试无签名构建
          $XCODE_CMD \
            -scheme voxlink_iOS \
            -configuration Debug \
            -sdk iphoneos \
            -arch arm64 \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
            2>&1 | tail -100
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "xcodebuild exit code: $BUILD_EXIT"
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "xcodebuild 失败，列出所有产物目录："
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -10
            find . -name "*.app" -type d 2>/dev/null | head -10
          fi

      - name: 打包 unsigned IPA
        run: |
          echo "=== 搜索 .app 产物 ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*Debug-iphoneos*" -type d 2>/dev/null | head -1)
          echo "找到 APP_PATH: $APP_PATH"
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -r VoxLink-unsigned.ipa Payload
            rm -rf Payload
            echo "IPA created: VoxLink-unsigned.ipa"
            ls -la VoxLink-unsigned.ipa
          else
            echo "=== 尝试用 tauri ios build --debug 构建模拟器版本 ==="
            cd $GITHUB_WORKSPACE
            tauri ios build --debug --target aarch64-apple-ios-sim 2>&1 | tail -40 || true
            echo "无法构建真机 IPA（需要 Apple 开发者账号签名）"
            exit 1
          fi

      - name: 上传 iOS unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-builds
          path: VoxLink-unsigned.ipa
          retention-days: 7

  # =========================================================================
  # 发布 Release 并上传所有产物
  # =========================================================================
  create-release:
    needs: [get-version, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: always() && (needs.build-linux.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: 下载 Linux 产物
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: artifacts/linux

      - name: 下载 Android 产物
        if: needs.build-android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: artifacts/android

      - name: 下载 iOS 产物
        if: always() && needs.build-ios.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ios-builds
          path: artifacts/ios

      - name: 整理产物（移除 -unsigned 等后缀便于识别）
        run: |
          mkdir -p release-assets
          # Linux
          find artifacts/linux -name "*.AppImage" -exec cp {} release-assets/ \; 2>/dev/null || true
          find artifacts/linux -name "*.deb" -exec cp {} release-assets/ \; 2>/dev/null || true
          # Android (优先 release APK，fallback debug)
          APK_RELEASE=$(find artifacts/android -name "*release*.apk" -type f | head -1)
          APK_DEBUG=$(find artifacts/android -name "*debug*.apk" -type f | head -1)
          if [ -n "$APK_RELEASE" ]; then
            cp "$APK_RELEASE" release-assets/VoxLink-v${{ needs.get-version.outputs.version }}.apk
          elif [ -n "$APK_DEBUG" ]; then
            cp "$APK_DEBUG" release-assets/VoxLink-v${{ needs.get-version.outputs.version }}.apk
          fi
          # iOS
          find artifacts/ios -name "*.ipa" -exec cp {} release-assets/ \; 2>/dev/null || true
          echo "=== Release 产物列表 ==="
          ls -la release-assets/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: VoxLink v${{ needs.get-version.outputs.version }}
          body: |
            # VoxLink v${{ needs.get-version.outputs.version }}

            ## 当前可用平台

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Linux (x86_64) | `.AppImage` / `.deb` | 开箱即用 |
            | Android (arm64) | `.apk` | 允许「未知来源」后直接安装 |
            | iOS | `.ipa` (unsigned) | 需使用 AltStore/Sideloadly 等工具自签名安装 |

            ## 安装说明

            ### Linux
            **AppImage（推荐）:**
            1. 下载 `.AppImage`
            2. `chmod +x VoxLink-*.AppImage`
            3. `./VoxLink-*.AppImage`

            **deb（Debian/Ubuntu）:**
            1. `sudo dpkg -i voxlink_*.deb`

            ### Android
            1. 下载 `.apk` 到手机
            2. 在文件管理器中点击安装，允许「未知来源」
            3. 首次启动授予「麦克风」权限

            ### iOS
            由于 Apple 限制，未签名 IPA 无法直接安装。您需要：
            - 使用 **AltStore** / **Sideloadly** 等工具用自己的 Apple ID 签名安装
            - 或使用 **TrollStore**（越狱设备）永久安装
            - macOS / Windows 版本正在开发中
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
