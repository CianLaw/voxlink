name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "VoxLink v__VERSION__"
          releaseBody: |
            ## VoxLink v__VERSION__

            高精度语音输入助手

            ### 安装说明

            **macOS**: 下载 .dmg 文件，双击打开后将 VoxLink 拖到 Applications 文件夹。首次运行需在「系统设置 → 隐私与安全性」中允许。

            **Windows**: 下载 .msi 文件，双击按向导安装。

            ### 使用方法
            1. 安装并启动软件（自动后台运行）
            2. 在任意应用中按 `Ctrl+Shift+V`（macOS: `Cmd+Shift+V`）唤起语音输入
            3. 说完后按 `Ctrl+Enter` 确认，或 `Esc` 取消

            ### 作者
            - 作者: @没
            - 邮箱: lao88888@agent.qq.com
            - 备用: lao132973264188@gmail.com
          releaseDraft: true
          prerelease: false

  # macOS .pkg 打包
  pkg:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: VoxLink-macos
          path: ./artifacts

      - name: Build .pkg
        run: |
          ls -la artifacts/
          # 将 .app 打包为 .pkg
          pkgbuild --root artifacts/VoxLink.app \
            --identifier com.voxlink.app \
            --version "${GITHUB_REF#refs/tags/v}" \
            --install-location /Applications/VoxLink.app \
            VoxLink.pkg

      - name: Upload .pkg to Release
        uses: softprops/action-gh-release@v1
        with:
          files: VoxLink.pkg
          token: ${{ secrets.GITHUB_TOKEN }}
