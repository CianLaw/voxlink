  #     - run: tauri build --target aarch64-apple-darwin --bundles dmg
  #     - name: 上传 macOS DMG
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: macos-builds
  #         path: src-tauri/target/*/release/bundle/dmg/*.dmg
  #         retention-days: 7

  # =========================================================================
  # Windows 构建已暂时注释（Rust 平台 API 编译问题）
  # =========================================================================

