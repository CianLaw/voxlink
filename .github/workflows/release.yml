name: VoxLink Release Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  # =========================================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT
          fi

  # =========================================================================
  # 唯一保底构建：Linux AppImage
  # macOS / Windows / Android 均已注释，待逐个修复后逐步启用
  # =========================================================================
  build-linux:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: 安装 Linux 系统依赖（Tauri 必需）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - run: npm install -g @tauri-apps/cli@latest

      - run: tauri build --bundles appimage

      - name: 上传 Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7

  # =========================================================================
  # macOS 构建已暂时注释（x86_64-apple-darwin 编译失败，待修复后启用）
