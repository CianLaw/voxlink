name: VoxLink Release Build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  # =========================================================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')" >> $GITHUB_OUTPUT
          fi

  # =========================================================================
  build-macos:
    needs: get-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - run: npm install -g @tauri-apps/cli@latest

      - run: tauri build --target x86_64-apple-darwin --bundles dmg

      - run: tauri build --target aarch64-apple-darwin --bundles dmg

      - name: 上传 macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: src-tauri/target/*/release/bundle/dmg/*.dmg
          retention-days: 7

  # =========================================================================
  build-windows:
    needs: get-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - run: npm install -g @tauri-apps/cli@latest

      - run: tauri build --target x86_64-pc-windows-msvc --bundles msi,nsis

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/nsis/*.exe
          retention-days: 7

  # =========================================================================
  build-android:
    needs: get-version
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: "34.0.0"
          target: "android-34"

      - run: npm install -g @tauri-apps/cli@latest

      - run: tauri android init

      - run: tauri android build --apk

      - name: 上传 Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
          retention-days: 7

  # =========================================================================
  create-release:
    needs: [get-version, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: always() && needs.build-macos.result == 'success' && needs.build-windows.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: 下载 macOS 产物
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: artifacts/macos

      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: artifacts/windows

      - name: 下载 Android 产物（如果存在）
        uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: artifacts/android
        continue-on-error: true

      - name: 整理产物
        run: |
          mkdir -p release-assets
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          find artifacts -name "*.msi" -exec cp {} release-assets/ \;
          find artifacts -name "*.exe" -exec cp {} release-assets/ \;
          find artifacts -name "*.apk" -exec cp {} release-assets/ \; 2>/dev/null || true
          ls -la release-assets/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: VoxLink v${{ needs.get-version.outputs.version }}
          body: |
            # VoxLink v${{ needs.get-version.outputs.version }}

            ## 支持平台
            - macOS 桌面端 (.dmg) — Apple Silicon / Intel
            - Windows 桌面端 (.msi / .exe) — x86_64
            - Android 移动端 (.apk) — 手机 / 平板

            ## 安装说明
            ### macOS
            1. 下载 .dmg，双击挂载
            2. 将 VoxLink 拖入 Applications
            3. 右键打开（未签名应用）+ 授予辅助功能和麦克风权限

            ### Windows
            1. 下载 .msi 安装程序
            2. 运行安装
            3. SmartScreen 警告时点击"更多信息"→"仍要运行"

            ### Android
            1. 下载 .apk
            2. 开启"允许安装未知来源"
            3. 点击安装，授予录音权限
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}